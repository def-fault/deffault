<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1. 캐릭터 프리셋 추가하기</title>
<link rel="stylesheet" href="./css/style.css">
<style>
html,body{height:auto;overflow-y:auto}
.container{padding:20px;max-width:900px;margin:auto}
.controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
.controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}
.toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#4f545c;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%}
input:checked + .slider{background:#409eff}
input:checked + .slider:before{transform:translateX(26px)}
.detailed-info{display:none}.simple-info{display:block}
body.detailed-view .detailed-info{display:block}
body.detailed-view .simple-info{display:none}
a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px}
.multi-lang{white-space:pre-line;}
</style>
</head>
<body>
<div class="controllers">
  <div class="help-level-selector">
    <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
    <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
    <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
  </div>
  <div class="language-selector">
    <label class="multi-lang" for="language-select" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
    <select id="language-select">
      <option value="ko">한국어</option><option value="en">English</option>
      <option value="ja">日本語</option><option value="zh-Hans">简体中文</option>
      <option value="zh-Hant">繁體中文</option>
    </select>
  </div>
</div>

<div class="container">
  <h2 class="multi-lang"
      data-ko="📖 [1] 캐릭터 프리셋 추가하기"
      data-en="📖 [1] Add a Character Preset"
      data-ja="📖 [1] キャラクタープリセットを追加"
      data-zh-Hans="📖 [1] 添加角色预设"
      data-zh-Hant="📖 [1] 新增角色預設">📖 [1] 캐릭터 프리셋 추가하기</h2>

	
	<img src="image/VRM_Step1.png" alt="" style="max-width:100%; height:auto;">
  <p class="simple-info multi-lang"
     data-ko="친구 추가 버튼으로 새 프리셋을 만들고 VRM 모델을 불러오세요."
     data-en="Press Add Friend to create a preset and load a VRM model."
     data-ja="友達追加ボタンでプリセットを作成し、VRMモデルを読み込みましょう。"
     data-zh-Hans="点击添加好友创建预设，并导入 VRM 模型。"
     data-zh-Hant="點擊新增好友建立預設，並匯入 VRM 模型。">친구 추가 버튼으로 새 프리셋을 만들고 VRM 모델을 불러오세요.</p>

  <div class="detailed-info">
    <ul>
      <li class="multi-lang"
        data-ko="<메인> 창에서 ‘친구 추가’ 버튼을 눌러 새로운 캐릭터 프리셋을 생성하세요."
        data-en="In the <Main> window, click the Add Friend button to create a new character preset."
        data-ja="&lt;メイン&gt;画面で「友達追加」ボタンを押して新しいキャラクタープリセットを作成しましょう。"
        data-zh-Hans="在 &lt;主界面&gt; 点击“添加好友”按钮创建新的角色预设。"
        data-zh-Hant="在 &lt;主畫面&gt; 點擊「新增好友」按鈕建立新的角色預設。">&lt;메인&gt; 창에서 ‘친구 추가’ 버튼을 눌러 새로운 캐릭터 프리셋을 생성하세요.</li>

      <li class="multi-lang"
        data-ko="프리셋 위에 마우스를 올리면 ‘톱니바퀴 아이콘’이 나타나고 &lt;캐릭터&gt; 창을 열 수 있어요."
        data-en="Hover over the preset to reveal the gear icon and open the <Character> window."
        data-ja="プリセットにマウスを乗せると歯車アイコンが現れ、&lt;キャラクター&gt;ウィンドウを開けます。"
        data-zh-Hans="将鼠标悬停在预设上可显示齿轮图标并打开 &lt;角色&gt; 窗口。"
        data-zh-Hant="將滑鼠停在預設上會顯示齒輪圖示並開啟 &lt;角色&gt; 視窗。">프리셋 위에 마우스를 올리면 ‘톱니바퀴 아이콘’이 나타나고 &lt;캐릭터&gt; 창을 열 수 있어요.</li>

      <li class="multi-lang"
        data-ko="BODY 버튼을 눌러 VRM 모델을 선택해 앱으로 불러올 수 있어요."
        data-en="Press the BODY button to select and import a VRM model into the app."
        data-ja="BODYボタンを押してVRMモデルを選択し、アプリに読み込めます。"
        data-zh-Hans="点击 BODY 按钮选择并导入 VRM 模型到应用。"
        data-zh-Hant="點擊 BODY 按鈕選擇並匯入 VRM 模型到應用程式。">BODY 버튼을 눌러 VRM 모델을 선택해 앱으로 불러올 수 있어요.</li>
    </ul>
  </div>

  <a class="page-nav next" href="inter-help-page2.html"
     data-ko="다음: VRM 모델 컨트롤하기 →"
     data-en="Next: Control the VRM Model →"
     data-ja="次へ：VRMモデルを操作 →"
     data-zh-Hans="下一步：控制 VRM 模型 →"
     data-zh-Hant="下一步：控制 VRM 模型 →">다음: VRM 모델 컨트롤하기 →</a>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const t=document.getElementById('help-level-toggle');
  const l=document.getElementById('language-select');
  const savedView=localStorage.getItem('desktopMaidHelpLevel')||'simple';
  const savedLang=localStorage.getItem('desktopMaidLang')||'ko';
  if(savedView==='detailed'){document.body.classList.add('detailed-view');t.checked=true;}
  l.value=savedLang;document.documentElement.lang=savedLang;

  const applyLang=lng=>{
    document.querySelectorAll('.multi-lang').forEach(el=>{
      const txt=el.getAttribute(`data-${lng}`);if(txt!==null)el.textContent=txt;
    });
    document.querySelectorAll('.page-nav').forEach(el=>{
      const txt=el.getAttribute(`data-${lng}`);if(txt!==null)el.textContent=txt;
    });
  };
  applyLang(savedLang);

  t.addEventListener('change',()=>{const v=t.checked?'detailed':'simple';localStorage.setItem('desktopMaidHelpLevel',v);document.body.classList.toggle('detailed-view',v==='detailed');});
  l.addEventListener('change',e=>{const lang=e.target.value;localStorage.setItem('desktopMaidLang',lang);document.documentElement.lang=lang;applyLang(lang);});
});
</script>
</body>
</html>
