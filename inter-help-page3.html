<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="multi-lang" data-ko="3. 캐릭터 인터렉션" data-en="3. Character Interaction" data-ja="3. キャラクターインタラクション" data-zh-Hans="3. 角色交互" data-zh-Hant="3. 角色交互">3. 캐릭터 인터렉션</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        html,body{height:auto;overflow-y:auto}
        .container{padding:20px;max-width:900px;margin:auto}
        .controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
        .controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}
        .toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
        .toggle-switch input{opacity:0;width:0;height:0}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#4f545c;border-radius:24px}
        .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%}
        input:checked + .slider{background:#409eff}
        input:checked + .slider:before{transform:translateX(26px)}
        .detailed-info{display:none}.simple-info{display:block}
        body.detailed-view .detailed-info{display:block}
        body.detailed-view .simple-info{display:none}
        a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px; color: #333;}
        .multi-lang{white-space:pre-line;}
    </style>
</head>
<body class="usage-body">
    <div class="controllers">
        <div class="help-level-selector">
            <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
            <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
            <span class="multi-lang" data-ko="자세히" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">자세히</span>
        </div>
        <div class="language-selector">
            <select id="language-select">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh-Hans">简体中文</option>
                <option value="zh-Hant">繁體中文</option>
            </select>
        </div>
    </div>

    <div class="container usage-wrapper">
        <h1 class="multi-lang" data-ko="3. 캐릭터 인터렉션" data-en="3. Character Interaction" data-ja="3. キャラクターインタラクション" data-zh-Hans="3. 角色交互" data-zh-Hant="3. 角色交互">3. 캐릭터 인터렉션</h1>
        
        <p class="simple-info multi-lang" 
           data-ko="마우스로 캐릭터를 이동, 회전, 확대 등 다양한 인터렉션이 가능해요." 
           data-en="Use your mouse to move, rotate, and scale the character." 
           data-ja="マウスでキャラクターを移動、回転、拡大など、多彩な操作が可能です。" 
           data-zh-Hans="您可以使用鼠标移动、旋转、缩放角色进行多种交互。" 
           data-zh-Hant="您可以使用鼠標移動、旋轉、縮放角色進行多種交互。">
           마우스로 캐릭터를 이동, 회전, 확대 등 다양한 인터렉션이 가능해요.
        </p>

        <div class="detailed-info">
            <ul>
                <li class="multi-lang" data-ko="왼쪽 클릭: 캐릭터 이동" data-en="Left Click: Move Character" data-ja="左クリック: キャラクターの移動" data-zh-Hans="左键点击: 移动角色" data-zh-Hant="左鍵點擊: 移動角色">왼쪽 클릭: 캐릭터 이동</li>
                <li class="multi-lang" data-ko="오른쪽 클릭: 캐릭터 회전" data-en="Right Click: Rotate Character" data-ja="右クリック: キャラクターの回転" data-zh-Hans="右键点击: 旋转角色" data-zh-Hant="右鍵點擊: 旋轉角色">오른쪽 클릭: 캐릭터 회전</li>
                <li class="multi-lang" data-ko="왼쪽 클릭 유지 + 휠 클릭: 캐릭터 크기 조절" data-en="Hold Left Click + Wheel Click: Rescale Character" data-ja="左クリック保持 + ホイールクリック: サイズ調整" data-zh-Hans="按住左键 + 滚轮点击: 调整大小" data-zh-Hant="按住左鍵 + 滾輪點擊: 調整大小">왼쪽 클릭 유지 + 휠 클릭: 캐릭터 크기 조절</li>
            </ul>
        </div>

        <img src="./image/VRM_Step3.png" alt="Interaction" style="max-width:100%; height:auto; border-radius: 8px; margin: 20px 0; border: 1px solid #424549;">

        <div style="display: flex; justify-content: space-between;">
            <a class="page-nav multi-lang" href="inter-help-page2.html" data-ko="이전" data-en="Prev" data-ja="戻る" data-zh-Hans="上一步" data-zh-Hant="上一步">이전</a>
            <a class="page-nav multi-lang" href="inter-help-page4.html" data-ko="다음" data-en="Next" data-ja="次へ" data-zh-Hans="下一步" data-zh-Hant="下一步">다음</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            const toggle=document.getElementById('help-level-toggle');
            const langSel=document.getElementById('language-select');
            const savedView=localStorage.getItem('desktopMaidHelpLevel')||'simple';
            const savedLang=localStorage.getItem('desktopMaidLang')||'ko';

            if(savedView==='detailed'){document.body.classList.add('detailed-view');toggle.checked=true;}
            langSel.value=savedLang;document.documentElement.lang=savedLang;

            const applyLang=lang=>{
                document.querySelectorAll('.multi-lang').forEach(el=>{
                    const txt=el.getAttribute(`data-${lang}`);if(txt!==null)el.textContent=txt;
                });
            };
            applyLang(savedLang);

            toggle.addEventListener('change',()=>{
                const v=toggle.checked?'detailed':'simple';
                localStorage.setItem('desktopMaidHelpLevel',v);
                document.body.classList.toggle('detailed-view',v==='detailed');
            });
            langSel.addEventListener('change',e=>{
                const lang=e.target.value;
                localStorage.setItem('desktopMaidLang',lang);
                document.documentElement.lang=lang;
                applyLang(lang);
            });
        });
    </script>
</body>
</html>
