<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3. 캐릭터 인터렉션</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    html,body{height:auto;overflow-y:auto}
    .container{padding:20px;max-width:900px;margin:auto}
    .controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
    .controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}

    /* 토글 스위치 */
    .toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#4f545c;border-radius:24px}
    .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%}
    input:checked + .slider{background:#409eff}
    input:checked + .slider:before{transform:translateX(26px)}

    .detailed-info{display:none}.simple-info{display:block}
    body.detailed-view .detailed-info{display:block}
    body.detailed-view .simple-info{display:none}

    a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px}
    .multi-lang{white-space:pre-line;}
  </style>
</head>
<body>
  <!-- ── 상단 컨트롤러 ── -->
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
      <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
      <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
    </div>
    <div class="language-selector">
      <label class="multi-lang" for="language-select"
        data-ko="언어:" data-en="Language:" data-ja="言語:"
        data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
      <select id="language-select">
        <option value="ko">한국어</option><option value="en">English</option>
        <option value="ja">日本語</option><option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
      </select>
    </div>
  </div>

  <!-- ■■■ container ■■■ -->
  <div class="container">
    <h2 class="multi-lang"
        data-ko="🖱️ [3] 캐릭터 인터렉션"
        data-en="🖱️ [3] Character Interaction"
        data-ja="🖱️ [3] キャラクターインタラクション"
        data-zh-Hans="🖱️ [3] 角色交互"
        data-zh-Hant="🖱️ [3] 角色互動">🖱️ [3] 캐릭터 인터렉션</h2>

	  <img src="image/VRM_Step3.png" alt="" style="max-width:100%; height:auto;">
    <!-- 간단 설명 -->
    <p class="simple-info multi-lang"
       data-ko="마우스로 캐릭터를 이동·회전·확대 등 다양한 인터렉션이 가능해요."
       data-en="Use your mouse to move, rotate, and scale the character."
       data-ja="マウスでキャラクターを移動・回転・拡大など多彩に操作できます。"
       data-zh-Hans="用鼠标即可移动、旋转、放大角色。"
       data-zh-Hant="用滑鼠即可移動、旋轉、放大角色。">마우스로 캐릭터를 이동·회전·확대 등 다양한 인터렉션이 가능해요.</p>

    <!-- 상세 설명 -->
    <div class="detailed-info">
      <ul>
        <li class="multi-lang"
            data-ko="🖱️ 마우스로 캐릭터와 인터렉션할 수 있어요."
            data-en="🖱️ You can interact with the character using the mouse."
            data-ja="🖱️ マウスでキャラクターとインタラクションできます。"
            data-zh-Hans="🖱️ 可以用鼠标与角色互动。"
            data-zh-Hant="🖱️ 可以用滑鼠與角色互動。">🖱️ 마우스로 캐릭터와 인터렉션할 수 있어요.</li>

        <li class="multi-lang"
            data-ko="👆 마우스 좌클릭으로 캐릭터를 이동시킬 수 있어요."
            data-en="👆 Left‑click to move the character."
            data-ja="👆 左クリックでキャラクターを移動できます。"
            data-zh-Hans="👆 左键单击可移动角色。"
            data-zh-Hant="👆 左鍵點擊可移動角色。">👆 마우스 좌클릭으로 캐릭터를 이동시킬 수 있어요.</li>

        <li class="multi-lang"
            data-ko="🔄 마우스 우클릭으로 캐릭터를 회전시킬 수 있어요."
            data-en="🔄 Right‑click to rotate the character."
            data-ja="🔄 右クリックでキャラクターを回転できます。"
            data-zh-Hans="🔄 右键单击可旋转角色。"
            data-zh-Hant="🔄 右鍵點擊可旋轉角色。">🔄 마우스 우클릭으로 캐릭터를 회전시킬 수 있어요.</li>

        <li class="multi-lang"
            data-ko="📏 좌클릭한 상태로 마우스 휠을 누르면 캐릭터 크기를 키울 수 있어요."
            data-en="📏 While holding left‑click, press the mouse wheel to enlarge the character."
            data-ja="📏 左クリックしたままホイールクリックでキャラクターを拡大できます。"
            data-zh-Hans="📏 按住左键的同时按下滚轮可放大角色。"
            data-zh-Hant="📏 按住左鍵同時按下滾輪可放大角色。">📏 좌클릭한 상태로 마우스 휠을 누르면 캐릭터 크기를 키울 수 있어요.</li>

        <li class="multi-lang"
            data-ko="🪑 윈도우 창의 헤더나 작업표시줄에 캐릭터를 앉힐 수 있어요."
            data-en="🪑 You can seat the character on a window header or the taskbar."
            data-ja="🪑 ウィンドウのタイトルバーやタスクバーにキャラクターを座らせることもできます。"
            data-zh-Hans="🪑 可以让角色坐在窗口标题栏或任务栏上。"
            data-zh-Hant="🪑 可以讓角色坐在視窗標題列或工作列上。">🪑 윈도우 창의 헤더나 작업표시줄에 캐릭터를 앉힐 수 있어요.</li>
      </ul>
    </div>

    <!-- 네비게이션 -->
    <a class="page-nav prev" href="inter-help-page2.html"
       data-ko="← 이전: VRM 모델 컨트롤"
       data-en="← Previous: Control VRM"
       data-ja="← 前へ：VRMモデル操作"
       data-zh-Hans="← 上一步：控制 VRM"
       data-zh-Hant="← 上一步：控制 VRM">← 이전: VRM 모델 컨트롤</a>

    <a class="page-nav next" href="inter-help-page4.html"
       data-ko="다음: 알람 활용하기 →"
       data-en="Next: Using Alarms →"
       data-ja="次へ：アラーム活用 →"
       data-zh-Hans="下一步：使用闹钟 →"
       data-zh-Hant="下一步：使用鬧鐘 →">다음: 알람 활용하기 →</a>
  </div><!-- container 끝 -->

  <!-- 언어·토글 스크립트 -->
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      const toggle=document.getElementById('help-level-toggle');
      const langSel=document.getElementById('language-select');
      const savedView=localStorage.getItem('desktopMaidHelpLevel')||'simple';
      const savedLang=localStorage.getItem('desktopMaidLang')||'ko';

      if(savedView==='detailed'){document.body.classList.add('detailed-view');toggle.checked=true;}
      langSel.value=savedLang;document.documentElement.lang=savedLang;

      const applyLang=lang=>{
        document.querySelectorAll('.multi-lang').forEach(el=>{
          const txt=el.getAttribute(`data-${lang}`);if(txt!==null)el.textContent=txt;
        });
        document.querySelectorAll('.page-nav').forEach(el=>{
          const txt=el.getAttribute(`data-${lang}`);if(txt!==null)el.textContent=txt;
        });
      };
      applyLang(savedLang);

      toggle.addEventListener('change',()=>{
        const v=toggle.checked?'detailed':'simple';
        localStorage.setItem('desktopMaidHelpLevel',v);
        document.body.classList.toggle('detailed-view',v==='detailed');
      });
      langSel.addEventListener('change',e=>{
        const lang=e.target.value;
        localStorage.setItem('desktopMaidLang',lang);
        document.documentElement.lang=lang;
        applyLang(lang);
      });
    });
  </script>
</body>
</html>
