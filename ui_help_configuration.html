<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환경설정 가이드</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="controllers" style="display: flex; justify-content: flex-end; align-items: center; gap: 25px; height: 60px; width: 100%; padding: 0 40px; background: #23272a; border-bottom: 1px solid #424549; box-sizing: border-box;">
        <div class="help-level-selector" style="display: flex; align-items: center; gap: 8px;">
            <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
            <label class="toggle-switch" style="position: relative; display: inline-block; width: 50px; height: 24px;">
                <input type="checkbox" id="help-level-toggle" style="opacity: 0; width: 0; height: 0;">
                <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4f545c; transition: .4s; border-radius: 24px;"></span>
            </label>
            <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
        </div>
        <div class="language-selector" style="display: flex; align-items: center; gap: 8px;">
            <label for="language-select" class="multi-lang" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
            <select id="language-select">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh-Hans">简体中文</option>
                <option value="zh-Hant">繁體中文</option>
            </select>
        </div>
    </div>
    <div class="container" style="padding: 20px; max-width: 900px; margin: auto;">
        <h2 class="multi-lang" data-ko="⚙️ 환경설정 가이드" data-en="⚙️ Settings Guide" data-ja="⚙️ 환경설정 가이드" data-zh-Hans="⚙️ 设置指南" data-zh-Hant="⚙️ 設定指南">⚙️ 환경설정 가이드</h2>
        <img src="image/UI_Config.png" alt="" style="max-width:100%; height:auto; border-radius: 8px; border: 1px solid #424549; margin: 20px 0;">
        
        <div class="detailed-info">
            <ul>
                <li class="multi-lang" data-ko="일반 설정: 테마, 폰트 크기, 투명도 등을 조절하여 나만의 작업 환경을 만드세요." data-en="General Settings: Create your own workspace by adjusting themes, fonts, and transparency." data-ja="일반 설정: 테마, 폰트 크기, 투명도 등을 조절하여 나만의 작업 환경을 만드세요." data-zh-Hans="常规设置：通过调整主题、字体和透明度来创建自己的工作空间。" data-zh-Hant="一般設定：透過調整主題、字體和透明度來建立自己的工作空間。">일반 설정: 테마, 폰트 크기, 투명도 등을 조절하여 나만의 작업 환경을 만드세요.</li>
                <li class="multi-lang" data-ko="AI 서비스 설정: API 키 업데이트 및 모델 전환을 통해 최적의 AI 엔진을 선택하세요." data-en="AI Service Settings: Choose the best AI engine by updating API keys and switching models." data-ja="AI 서비스 설정: API 키 업데이트 및 모델 전환을 통해 최적의 AI 엔진을 선택하세요." data-zh-Hans="AI 服务设置：通过更新 API 密钥和切换模型选择最佳 AI 引擎。" data-zh-Hant="AI 服務設定：透過更新 API 金鑰和切換模型選擇最佳 AI 引擎。">AI 서비스 설정: API 키 업데이트 및 모델 전환을 통해 최적의 AI 엔진을 선택하세요.</li>
                <li class="multi-lang" data-ko="고급 설정: 네트워크 프록시 및 대화 기록 관리 등 심화 기능을 제공합니다." data-en="Advanced Settings: Provides deep features like network proxy and chat history management." data-ja="고급 설정: 네트워크 프록시 및 대화 기록 관리 등 심화 기능을 제공합니다." data-zh-Hans="高级设置：提供网络代理和对话历史管理等深度功能。" data-zh-Hant="進階設定：提供網路代理和對話歷史管理等深度功能。">고급 설정: 네트워크 프록시 및 대화 기록 관리 등 심화 기능을 제공합니다.</li>
            </ul>
        </div>

        <a class="page-nav prev multi-lang" href="inter-help-page5.html" data-ko="← 이전: 상호작용 설정" data-en="← Prev: Interaction Setup" data-ja="← 이전: 상호작용 설정" data-zh-Hans="← 上一步：交互设置" data-zh-Hant="← 上一步：交互設置" style="display: inline-block; margin-top: 30px; text-decoration: none; background: #eee; padding: 10px 20px; border-radius: 6px; color: #333;">← 이전: 상호작용 설정</a>
    </div>
    <style>
        .toggle-switch .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #409eff; }
        input:checked + .slider:before { transform: translateX(26px); }
        .detailed-info { display: none; }
        body.detailed-view .detailed-info { display: block; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('help-level-toggle');
            const langSel = document.getElementById('language-select');
            const savedView = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
            const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

            if (savedView === 'detailed') {
                document.body.classList.add('detailed-view');
                toggle.checked = true;
            }

            langSel.value = savedLang;
            document.documentElement.lang = savedLang;

            const updateLang = (lang) => {
                document.querySelectorAll('.multi-lang').forEach(el => {
                    const txt = el.getAttribute(`data-${lang}`);
                    if (txt) el.innerHTML = txt;
                });
            };

            updateLang(savedLang);

            toggle.addEventListener('change', () => {
                const level = toggle.checked ? 'detailed' : 'simple';
                localStorage.setItem('desktopMaidHelpLevel', level);
                document.body.classList.toggle('detailed-view', level === 'detailed');
            });

            langSel.addEventListener('change', e => {
                const lang = e.target.value;
                localStorage.setItem('desktopMaidLang', lang);
                document.documentElement.lang = lang;
                updateLang(lang);
            });
        });
    </script>
</body>
</html>
