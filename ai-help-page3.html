<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3. 캐릭터 프리셋 추가하기</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    html,body{height:auto;overflow-y:auto}
    .container{padding:20px;max-width:900px;margin:auto}
    .controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
    .controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}
    .toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#4f545c;transition:.4s;border-radius:24px}
    .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:#fff;transition:.4s;border-radius:50%}
    input:checked+.slider{background-color:#409eff}
    input:checked+.slider:before{transform:translateX(26px)}
    .detailed-info{display:none}
    .simple-info{display:block}
    body.detailed-view .detailed-info{display:block}
    body.detailed-view .simple-info{display:none}
    a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px}
  </style>
</head>
<body>
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單"></span>
      <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
      <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細"></span>
    </div>
    <div class="language-selector">
      <label for="language-select" class="multi-lang" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言："></label>
      <select id="language-select">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
      </select>
    </div>
  </div>

  <div class="container">
    <h2 class="multi-lang" data-ko="🔹 3. 캐릭터 프리셋 추가하기" data-en="🔹 3. Add a Character Preset" data-ja="🔹 3. キャラクタープリセットを追加する" data-zh-Hans="🔹 3. 添加角色预设" data-zh-Hant="🔹 3. 新增角色預設"></h2>


	<img src="image/AI_Step3.png" alt="" style="max-width:100%; height:auto;">
	  
    <p class="simple-info multi-lang" data-ko="친구 추가 버튼으로 새 캐릭터를 만들고 톱니바퀴 아이콘으로 설정을 시작하세요." data-en="Create a new character with the Add Friend button and click the gear icon to customize." data-ja="「友達追加」ボタンで新しいキャラクターを作成し、歯車アイコンで設定を始めましょう。" data-zh-Hans="点击“添加好友”按钮创建新角色，并用齿轮图标开始设置。" data-zh-Hant="點擊「新增好友」按鈕建立新角色，並用齒輪圖示開始設定。"></p>

    <div class="detailed-info">
      <p class="multi-lang" data-ko="🛠 이제 본격적으로 자신만의 캐릭터를 만들어봅시다!" data-en="🛠 Now, let's create your very own character!" data-ja="🛠 いよいよ自分だけのキャラクターを作ってみましょう！" data-zh-Hans="🛠 现在正式开始创建属于你自己的角色吧！" data-zh-Hant="🛠 現在正式開始創建屬於你自己的角色吧！">🛠 現在正式開始創建屬於你自己的角色吧！</p>
	
      <ul>
        <li class="multi-lang" data-ko="&lt;메인&gt; 창에서 ‘친구 추가’ 버튼을 눌러 새 캐릭터를 생성하세요." data-en="In the Main window, click the 'Add Friend' button to create a new character." data-ja="&lt;メイン&gt;画面で「友達追加」ボタンを押して新しいキャラクターを作成してください。" data-zh-Hans="在&lt;主界面&gt;中点击“添加好友”按钮来创建新角色。" data-zh-Hant="在&lt;主畫面&gt;中點擊「新增好友」按鈕來建立新角色。"></li>
        <li class="multi-lang" data-ko="캐릭터 프리셋 위에 마우스를 올리면 톱니바퀴 아이콘이 나타나요." data-en="Hover over the character preset to reveal the gear icon." data-ja="キャラクタープリセットにカーソルを合わせると、歯車アイコンが表示されます。" data-zh-Hans="将鼠标悬停在角色预设上时会显示齿轮图标。" data-zh-Hant="將滑鼠移到角色預設上時會出現齒輪圖示。"></li>
        <li class="multi-lang" data-ko="아이콘을 눌러 &lt;캐릭터 설정&gt; 창으로 들어가면 캐릭터 설정을 시작할 수 있어요." data-en="Click the icon to enter the &lt;Character Settings&gt; window and begin customization." data-ja="アイコンをクリックすると&lt;キャラクター設定&gt;画面に入り、設定を始められます。" data-zh-Hans="点击图标进入&lt;角色设置&gt;窗口，即可开始设置。" data-zh-Hant="點擊圖示進入&lt;角色設定&gt;視窗，即可開始設定。"></li>
      </ul>
    </div>

    <a class="page-nav prev" href="ai-help-page2.html" data-ko="← 이전: 유저 프로필 설정하기" data-en="← Previous: Set up your user profile" data-ja="← 前へ：ユーザープロフィールの設定" data-zh-Hans="← 上一步：设置用户资料" data-zh-Hant="← 上一步：設定使用者資料"></a>
    <a class="page-nav next" href="ai-help-page4.html" data-ko="다음: 당신과 함께할 캐릭터 만들기 →" data-en="Next: Create Your Character →" data-ja="次へ：キャラクターとの会話を始めよう →" data-zh-Hans="下一步：开始与角色对话 →" data-zh-Hant="下一步：開始與角色對話 →">Next: Create Your Companion Character →</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const helpLevelToggle = document.getElementById('help-level-toggle');
      const languageSelect = document.getElementById('language-select');
      const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
      const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

      if (savedLevel === 'detailed') {
        document.body.classList.add('detailed-view');
        helpLevelToggle.checked = true;
      }

      languageSelect.value = savedLang;
      document.documentElement.lang = savedLang;

      const updateLang = (lang) => {
        document.querySelectorAll('.multi-lang').forEach(el => {
          const txt = el.getAttribute(`data-${lang}`);
          if (txt) el.innerHTML = txt;
        });
        document.querySelectorAll('.page-nav').forEach(el => {
          const txt = el.getAttribute(`data-${lang}`);
          if (txt) el.innerHTML = txt;
        });
      };

      updateLang(savedLang);

      helpLevelToggle.addEventListener('change', () => {
        const level = helpLevelToggle.checked ? 'detailed' : 'simple';
        localStorage.setItem('desktopMaidHelpLevel', level);
        document.body.classList.toggle('detailed-view', level === 'detailed');
      });

      languageSelect.addEventListener('change', e => {
        const lang = e.target.value;
        localStorage.setItem('desktopMaidLang', lang);
        document.documentElement.lang = lang;
        updateLang(lang);
      });
    });
  </script>
</body>
</html>
