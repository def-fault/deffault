<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. 캐릭터 설정하기</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        html, body { height: auto; overflow-y: auto; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .controllers { display: flex; justify-content: flex-end; align-items: center; gap: 25px; height: 60px; width: 100%; padding: 0 40px; background: #23272a; border-bottom: 1px solid #424549; box-sizing: border-box; }
        .controllers .language-selector, .controllers .help-level-selector { background: none; border: none; display: flex; align-items: center; gap: 8px; }
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4f545c; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #409eff; }
        input:checked + .slider:before { transform: translateX(26px); }
        .detailed-info { display: none; }
        .simple-info { display: block; }
        body.detailed-view .detailed-info { display: block; }
        body.detailed-view .simple-info { display: none; }
        a.page-nav { display: inline-block; margin-top: 30px; text-decoration: none; background: #eee; padding: 10px 20px; border-radius: 6px; color: #333; }
    </style>
</head>
<body>
    <div class="controllers">
        <div class="help-level-selector">
            <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
            <label class="toggle-switch">
                <input type="checkbox" id="help-level-toggle">
                <span class="slider"></span>
            </label>
            <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
        </div>
        <div class="language-selector">
            <label for="language-select" class="multi-lang" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
            <select id="language-select">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh-Hans">简体中文</option>
                <option value="zh-Hant">繁體中文</option>
            </select>
        </div>
    </div>

    <div class="container">
        <h2 class="multi-lang" data-ko="🔹 3. 캐릭터 설정하기" data-en="🔹 3. Configure character" data-ja="🔹 3. キャラクターの設定" data-zh-Hans="🔹 3. 配置角色" data-zh-Hant="🔹 3. 配置角色">🔹 3. 캐릭터 설정하기</h2>
        
        <img src="image/AI_Step3.png" alt="" style="max-width:100%; height:auto; border-radius: 8px; border: 1px solid #424549; margin: 20px 0;">
        
        <p class="multi-lang" data-ko="AI 캐릭터의 성격과 말투를 자유롭게 커스텀할 수 있습니다." data-en="You can freely customize the AI character's personality and speech style." data-ja="AI 캐릭터의 성격과 말투를 자유롭게 커스텀할 수 있습니다." data-zh-Hans="您可以自由定制AI角色的性格和说话风格。" data-zh-Hant="您可以自由定制AI角色的性格和說話風格。">AI 캐릭터의 성격과 말투를 자유롭게 커스텀할 수 있습니다.</p>

        <div class="detailed-info">
            <ul>
                <li class="multi-lang" data-ko="시스템 프롬프트: 캐릭터의 기본 설정과 세계관을 입력합니다." data-en="System Prompt: Enter the basic details and world-view of the character." data-ja="시스템 프롬프트: 캐릭터의 기본 설정과 세계관을 입력합니다." data-zh-Hans="系统提示词：输入角色的基本设置和世界观。" data-zh-Hant="系統提示詞：輸入角色的基本設定和世界觀。">시스템 프롬프트: 캐릭터의 기본 설정과 세계관을 입력합니다.</li>
                <li class="multi-lang" data-ko="대화 예시: AI가 참고할 짧은 대화 예시를 입력하면 더 자연스러운 말투가 됩니다." data-en="Conversation Examples: Input short conversation examples for the AI to refer to for a more natural speech style." data-ja="대화 예시: AI가 참고할 짧은 대화 예시를 입력하면 더 자연스러운 말투가 됩니다." data-zh-Hans="对话示例：输入简短的对话示例供AI参考，会让说话风格更自然。" data-zh-Hant="對話範例：輸入簡短的對話範例供AI參考，會讓說話風格更自然。">대화 예시: AI가 참고할 짧은 대화 예시를 입력하면 더 자연스러운 말투가 됩니다.</li>
                <li class="multi-lang" data-ko="지식 데이터베이스: 특정 정보나 지식을 AI에게 가르칠 수 있습니다." data-en="Knowledge Database: You can teach specific information or knowledge to the AI." data-ja="지식 데이터베이스: 특정 정보나 지식을 AI에게 가르칠 수 있습니다." data-zh-Hans="知识数据库：您可以教给AI特定的信息或知识。" data-zh-Hant="知識資料庫：您可以教給AI特定的資訊或知識。">지식 데이터베이스: 특정 정보나 지식을 AI에게 가르칠 수 있습니다.</li>
            </ul>
        </div>

        <a class="page-nav prev multi-lang" href="ai-help-page2.html" data-ko="← 이전: 유저 프로필 설정" data-en="← Prev: Set user profile" data-ja="← 이전: 유저 프로필 설정" data-zh-Hans="← 上一步：设置用户资料" data-zh-Hant="← 上一步：設定使用者資料">← 이전: 유저 프로필 설정</a>
        <a class="page-nav next multi-lang" href="ai-help-page4.html" data-ko="다음: 대화 시작하기 →" data-en="Next: Start talking →" data-ja="다음: 대화 시작하기 →" data-zh-Hans="下一步：开始对话 →" data-zh-Hant="下一步：開始對話 →">다음: 대화 시작하기 →</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const helpLevelToggle = document.getElementById('help-level-toggle');
            const languageSelect = document.getElementById('language-select');
            const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
            const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

            if (savedLevel === 'detailed') {
                document.body.classList.add('detailed-view');
                helpLevelToggle.checked = true;
            }

            languageSelect.value = savedLang;
            document.documentElement.lang = savedLang;

            const updateLang = (lang) => {
                document.querySelectorAll('.multi-lang').forEach(el => {
                    const txt = el.getAttribute(`data-${lang}`);
                    if (txt) el.innerHTML = txt;
                });
                document.querySelectorAll('.page-nav').forEach(el => {
                    const txt = el.getAttribute(`data-${lang}`);
                    if (txt) el.textContent = txt;
                });
            };

            updateLang(savedLang);

            helpLevelToggle.addEventListener('change', () => {
                const level = helpLevelToggle.checked ? 'detailed' : 'simple';
                localStorage.setItem('desktopMaidHelpLevel', level);
                document.body.classList.toggle('detailed-view', level === 'detailed');
            });

            languageSelect.addEventListener('change', e => {
                const lang = e.target.value;
                localStorage.setItem('desktopMaidLang', lang);
                document.documentElement.lang = lang;
                updateLang(lang);
            });
        });
    </script>
</body>
</html>
