<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1. 캐릭터 AI 대화 기능 활성화하기</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html, body { height: auto; overflow-y: auto; }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .controllers {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 25px;
      height: 60px;
      width: 100%;
      padding: 0 40px;
      background: #23272a;
      border-bottom: 1px solid #424549;
      box-sizing: border-box;
    }
    .controllers .language-selector,
    .controllers .help-level-selector {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #4f545c;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #409eff;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .detailed-info { display: none; }
    .simple-info { display: block; }
    body.detailed-view .detailed-info { display: block; }
    body.detailed-view .simple-info { display: none; }
    a.page-nav { display: inline-block; margin-top: 30px; text-decoration: none; background: #eee; padding: 10px 20px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" 
	  data-ko="간단" 
	  data-en="Simple" 
	  data-ja="簡易" 
	  data-zh-Hans="简单" 
	  data-zh-Hant="簡單">
	</span>
      <label class="toggle-switch">
        <input type="checkbox" id="help-level-toggle">
        <span class="slider"></span>
      </label>
      <span class="multi-lang" 
	  data-ko="상세" 
	  data-en="Detailed" 
	  data-ja="詳細" 
	  data-zh-Hans="详细" 
	  data-zh-Hant="詳細">
	</span>
    </div>
    <div class="language-selector">
      <label for="language-select" class="multi-lang"
	  data-ko="언어:"
	  data-en="Language:"
	  data-ja="言語:"
	  data-zh-Hans="语言："
	  data-zh-Hant="語言：">
	</label>
      <select id="language-select">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
      </select>
    </div>
  </div>
  <div class="container">
    <h2 class="multi-lang" 
      data-ko="🔹 1. 캐릭터 AI 대화 기능 활성화하기"
      data-en="🔹 1. Enable Character AI Conversation"
      data-ja="🔹 1. キャラクターAI会話を有効にする"
      data-zh-Hans="🔹 1. 启用角色AI对话功能"
      data-zh-Hant="🔹 1. 啟用角色AI對話功能">
    </h2>

	<img src="image/Step1.png" alt="설명 텍스트" style="max-width:100%; height:auto;">
    <p class="multi-lang"
      data-ko="AI 캐릭터와 대화하려면 먼저 AI 기능을 활성화해야 해요."
      data-en="To chat with AI characters, you must first enable the AI feature."
      data-ja="AIキャラクターと会話するには、まずAI機能を有効にする必要があります。"
      data-zh-Hans="要与AI角色聊天，您需要先启用AI功能。"
      data-zh-Hant="要與AI角色聊天，您需先啟用AI功能。">
    </p>

    <div class="detailed-info">
      <p class="multi-lang"
        data-ko="두 가지 방식 중 하나를 선택해서 사용하세요:"
        data-en="You can choose one of the two methods:"
        data-ja="以下の2つの方法のいずれかを選んで使用してください:"
        data-zh-Hans="您可以选择以下两种方法之一："
        data-zh-Hant="您可以選擇以下兩種方式之一：">
      </p>
      <ul>
        <li class="multi-lang" data-ko="✅ 방법 1: Gemini API 사용하기 (클라우드 기반)"
            data-en="✅ Method 1: Use Gemini API (Cloud-based)"
            data-ja="✅ 方法1: Gemini APIの使用(クラウドベース)"
            data-zh-Hans="✅ 方法一：使用Gemini API（基于云）"
            data-zh-Hant="✅ 方式一：使用Gemini API（雲端基礎）">
        

			
		<li class="multi-lang" 
			 data-ko='Google Cloud 또는 <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>에서 Gemini API 키를 발급받습니다.'
			 data-en='Get a Gemini API key from Google Cloud or <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>.'
			 data-ja='Google Cloudまたは<a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>でGemini APIキーを取得します。'
			 data-zh-Hans='从Google Cloud或<a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>获取Gemini API密钥。'
			 data-zh-Hant='從Google Cloud或<a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>取得Gemini API金鑰。'>
		</li>
         <li class="multi-lang"
			  data-ko="앱의 톱니바퀴(⚙️) 아이콘을 클릭하여 환경설정에 들어갑니다."
			  data-en="Click the gear icon (⚙️) to open the settings in the app."
			  data-ja="アプリで歯車アイコン（⚙️）をクリックして設定を開きます。"
			  data-zh-Hans="点击应用中的齿轮图标（⚙️）进入设置。"
			  data-zh-Hant="點擊應用中的齒輪圖示（⚙️）進入設定。">
			</li>
			<li class="multi-lang"
			  data-ko="API 키를 입력하고 ‘적용’ 버튼을 클릭하면 설정 완료!"
			  data-en="Enter the API key and click 'Apply' to complete the setup!"
			  data-ja="APIキーを入力し、「適用」をクリックすれば設定完了！"
			  data-zh-Hans="输入API密钥并点击“应用”即可完成设置！"
			  data-zh-Hant="輸入API金鑰並點選「套用」即可完成設定！">
			</li>
			<br>
			<li class="multi-lang"
			  data-ko="✅ 방법 2: Ollama로 로컬 AI 모델 사용하기"
			  data-en="✅ Method 2: Use local AI model with Ollama"
			  data-ja="✅ 方法2：OllamaでローカルAIモデルを使用"
			  data-zh-Hans="✅ 方法二：使用Ollama本地AI模型"
			  data-zh-Hant="✅ 方法二：使用Ollama本地AI模型">
			</li>
			<li class="multi-lang"
			  data-ko="Ollama를 Windows에 설치하고 원하는 모델을 적용합니다."
			  data-en="Install Ollama on Windows and apply your desired model."
			  data-ja="WindowsにOllamaをインストールし、希望するモデルを適用します。"
			  data-zh-Hans="在Windows上安装Ollama并应用您想要的模型。"
			  data-zh-Hant="在Windows上安裝Ollama並套用所需的模型。">
			</li>
			<li class="multi-lang"
			  data-ko="👉설치 방법은 해당 설명서를 통해 자세히 확인할 수 있어요."
			  data-en="👉 You can check the detailed installation guide in the documentation."
			  data-ja="👉 インストール方法は説明書で詳しく確認できます。"
			  data-zh-Hans="👉 可以通过该文档详细了解安装方法。"
			  data-zh-Hant="👉 可以透過該說明文件詳細了解安裝方式。">
			</li>
			<li class="multi-lang"
			  data-ko="‘Ollama 모델이 적용되었습니다.’ 메시지가 나오면 연결 완료!"
			  data-en="If you see 'Ollama model applied', the connection is complete!"
			  data-ja="「Ollamaモデルが適用されました」というメッセージが表示されたら接続完了！"
			  data-zh-Hans="出现“已应用Ollama模型”消息即表示连接完成！"
			  data-zh-Hant="出現「已套用Ollama模型」訊息即表示連線完成！">
			</li>
      </ul>
    </div>
    <a class="page-nav next" href="ai-help-page2.html"
   data-ko="다음: 유저 프로필 설정하기 →"
   data-en="Next: Set up your user profile →"
   data-ja="次へ：ユーザープロフィールの設定 →"
   data-zh-Hans="下一步：设置用户资料 →"
   data-zh-Hant="下一步：設定使用者資料 →">
</a>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const helpLevelToggle = document.getElementById('help-level-toggle');
    const languageSelect = document.getElementById('language-select');
    const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
    const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

    if (savedLevel === 'detailed') {
      document.body.classList.add('detailed-view');
      helpLevelToggle.checked = true;
    }

    languageSelect.value = savedLang;
    document.documentElement.lang = savedLang;

    // 초기 다국어 텍스트 세팅
	document.querySelectorAll('.multi-lang').forEach(el => {
	  const text = el.getAttribute(`data-${savedLang}`);
	  if (text) el.innerHTML = text;  // 핵심 변경점
	});

    document.querySelectorAll('.page-nav').forEach(el => {
      const text = el.getAttribute(`data-${savedLang}`);
      if (text) el.textContent = text;
    });

    // 이벤트 핸들러 설정
    helpLevelToggle.addEventListener('change', () => {
      const level = helpLevelToggle.checked ? 'detailed' : 'simple';
      localStorage.setItem('desktopMaidHelpLevel', level);
      document.body.classList.toggle('detailed-view', level === 'detailed');
    });

    languageSelect.addEventListener('change', e => {
      const lang = e.target.value;
      localStorage.setItem('desktopMaidLang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('.multi-lang').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
      document.querySelectorAll('.page-nav').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
    });
  });
</script>
</body>
</html>
