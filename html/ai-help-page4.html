<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4. 캐릭터 만들기</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html,body{height:auto;overflow-y:auto}
    .container{padding:20px;max-width:900px;margin:auto}
    .controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
    .controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}
    .toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#4f545c;transition:.4s;border-radius:24px}
    .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;transition:.4s;border-radius:50%}
    input:checked+.slider{background:#409eff}
    input:checked+.slider:before{transform:translateX(26px)}
    .detailed-info{display:none}.simple-info{display:block}body.detailed-view .detailed-info{display:block}body.detailed-view .simple-info{display:none}
    a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px}
  </style>
</head>
<body>
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單"></span>
      <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
      <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細"></span>
    </div>
    <div class="language-selector">
      <label for="language-select" class="multi-lang" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言："></label>
      <select id="language-select"><option value="ko">한국어</option><option value="en">English</option><option value="ja">日本語</option><option value="zh-Hans">简体中文</option><option value="zh-Hant">繁體中文</option></select>
    </div>
  </div>

  <div class="container">
  <h2 class="multi-lang"
    data-ko="🔹 4. 당신과 함께할 캐릭터 만들기"
    data-en="🔹 4. Create Your Companion Character"
    data-ja="🔹 4. あなたと一緒に歩むキャラクターを作ろう"
    data-zh-Hans="🔹 4. 创建陪伴你的角色"
    data-zh-Hant="🔹 4. 建立陪伴你的角色"></h2>

<p class="simple-info multi-lang"
    data-ko="기본 정보·성격·외형을 자세히 적어 캐릭터에 영혼을 불어넣으세요!"
    data-en="Detail basic info, personality and appearance to breathe life into your character!"
    data-ja="基本情報や性格、外見を詳しく書いてキャラクターに魂を吹き込みましょう！"
    data-zh-Hans="详细填写基本信息、性格和外形，为角色注入灵魂！"
    data-zh-Hant="詳細填寫基本資訊、性格與外型，為角色注入靈魂！"></p>

<div class="detailed-info">
  <p class="multi-lang"
     data-ko="캐릭터의 ‘영혼’을 불어넣는 작업이에요. 항목을 자세히 작성할수록 캐릭터가 더 입체적이고 생생해져요."
     data-en="This is where you breathe a soul into your character. The more detail you add, the more vivid and three‑dimensional they become."
     data-ja="キャラクターの“魂”を吹き込む作業です。項目を詳しく書けば書くほど、キャラクターがより立体的で生き生きとします。"
     data-zh-Hans="这是为角色注入“灵魂”的步骤。项写得越详细，角色就越立体、生动。"
     data-zh-Hant="這是為角色注入「靈魂」的步驟。項目寫得越詳細，角色就越立體、生動。"></p>

  <ul>
    <li class="multi-lang"
        data-ko="🛠 설정 항목 설명:"
        data-en="🛠 Setting items explained:"
        data-ja="🛠 設定項目の説明："
        data-zh-Hans="🛠 设置项目说明："
        data-zh-Hant="🛠 設定項目說明："></li>

    <li class="multi-lang"
        data-ko="기본 정보 – 이름 · 성별 · 성격"
        data-en="Basic info – Name · Gender · Personality"
        data-ja="基本情報 – 名前 · 性別 · 性格"
        data-zh-Hans="基本信息 – 名称 · 性别 · 性格"
        data-zh-Hant="基本資訊 – 名稱 · 性別 · 性格"></li>

    <li class="multi-lang"
        data-ko="프로필 메시지 – 캐릭터의 현재 상태를 짧게 표현 (예: &quot;지금은 약간 바빠요...&quot;, &quot;너랑 같이 있으니 즐거워!&quot;)"
        data-en="Profile message – short line showing their current status<br>Ex: &quot;I'm a bit busy now...&quot;, &quot;Happy to be with you!&quot;"
        data-ja="プロフィールメッセージ – キャラクターの今の状態を短く表現(例：&quot;今はちょっと忙しい...&quot;、&quot;あなたと一緒で楽しい！&quot;)"
        data-zh-Hans="资料消息 – 简短表达角色当前状态 (例：&quot;现在有点忙...&quot;、&quot;和你在一起好开心！&quot;)"
        data-zh-Hant="資料訊息 – 簡短表達角色目前狀態 (例：&quot;現在有點忙...&quot;、&quot;和你在一起好開心！&quot;)">プロフィールメッセージ – キャラクターの今の状態を短く表現 (例："今はちょっと忙しい..."、"あなたと一緒で楽しい！")</li>

    <li class="multi-lang"
        data-ko="지능(INT) – 논리·지적 능력 수치"
        data-en="Intelligence (INT) – logical / intellectual stat"
        data-ja="知能(INT) – 論理・知的能力値"
        data-zh-Hans="智力(INT) – 逻辑／智力数值"
        data-zh-Hant="智力(INT) – 邏輯／智力數值"></li>

    <li class="multi-lang"
        data-ko="친밀도(AFF) – 당신과의 관계 정도 (대화할수록 상승)"
        data-en="Affinity (AFF) – closeness to you (increases as you chat)"
        data-ja="親密度(AFF) – あなたとの関係度（会話すると上昇）"
        data-zh-Hans="亲密度(AFF) – 你们的关系程度（聊天会提升）"
        data-zh-Hant="親密度(AFF) – 你們的關係程度（聊天會提升）"></li>

    <li class="multi-lang"
        data-ko="캐릭터 설정(핵심) – 성격·배경·말투·가치관·외모 등 구체적으로 작성"
        data-en="Character settings (core) – describe personality, backstory, speech style, values, appearance in detail"
        data-ja="キャラクター設定(核心) – 性格・背景・口調・価値観・外見などを具体的に記述"
        data-zh-Hans="角色设置(核心) – 具体描述性格、背景、语气、价值观、外貌等"
        data-zh-Hant="角色設定(核心) – 具體敘述性格、背景、語氣、價值觀、外貌等"></li>

	<li class="multi-lang"
     data-ko="대화 예시 – 대사 샘플을 많이 제공할수록 캐릭터가 그 말투를 이해하고 잘 구사하게 돼요."
     data-en="Conversation examples – The more sample lines you provide, the better the character understands and uses that speech style."
     data-ja="会話例 – セリフサンプルを多く提供するほど、キャラクターがその口調を理解し上手に使えるようになります。"
     data-zh-Hans="对话示例 – 提供的台词样本越多，角色越能理解并熟练运用该语气。"
     data-zh-Hant="對話示例 – 提供的台詞樣本越多，角色越能理解並熟練運用該語氣。"></li>

  </ul>
  <!-- 저장 버튼 안내는 리스트 밖 -->
  <p class="multi-lang"
     data-ko="&lt;메인&gt; 창에서 ‘저장’ 버튼도 꼭 눌러서 캐릭터 프리셋 데이터가 유실되지 않게 하세요!"
     data-en="Be sure to press the 'Save' button in the &lt;Main&gt; window so your preset data isn't lost!"
     data-ja="&lt;メイン&gt;画面で「保存」ボタンを必ず押して、キャラクタープリセットのデータが失われないようにしてください！"
     data-zh-Hans="在&lt;主界面&gt;务必点击“保存”按钮，以免角色预设数据丢失！"
     data-zh-Hant="在&lt;主畫面&gt;務必點擊「保存」按鈕，以免角色預設資料遺失！"></p>
</div>

<a class="page-nav prev"
   href="ai-help-page3.html"
   data-ko="← 이전: 캐릭터 프리셋 추가하기"
   data-en="← Previous: Add Character Preset"
   data-ja="← 前へ：キャラクタープリセットを追加"
   data-zh-Hans="← 上一步：添加角色预设"
   data-zh-Hant="← 上一步：新增角色預設"></a>

<a class="page-nav next"
   href="ai-help-page5.html"
   data-ko="다음: 캐릭터와 대화 시작하기 →"
   data-en="Next: Start chatting with your character →"
   data-ja="次へ：キャラクターとの会話を始めよう →"
   data-zh-Hans="下一步：开始与角色对话 →"
   data-zh-Hant="下一步：開始與角色對話 →"></a>
	  
	  
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const helpLevelToggle = document.getElementById('help-level-toggle');
    const languageSelect = document.getElementById('language-select');
    const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
    const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

    if (savedLevel === 'detailed') {
      document.body.classList.add('detailed-view');
      helpLevelToggle.checked = true;
    }

    languageSelect.value = savedLang;
    document.documentElement.lang = savedLang;

    // 초기 다국어 텍스트 세팅
    document.querySelectorAll('.multi-lang').forEach(el => {
      const text = el.getAttribute(`data-${savedLang}`);
      if (text) el.textContent = text;
    });
    document.querySelectorAll('.page-nav').forEach(el => {
      const text = el.getAttribute(`data-${savedLang}`);
      if (text) el.textContent = text;
    });

    // 이벤트 핸들러 설정
    helpLevelToggle.addEventListener('change', () => {
      const level = helpLevelToggle.checked ? 'detailed' : 'simple';
      localStorage.setItem('desktopMaidHelpLevel', level);
      document.body.classList.toggle('detailed-view', level === 'detailed');
    });

    languageSelect.addEventListener('change', e => {
      const lang = e.target.value;
      localStorage.setItem('desktopMaidLang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('.multi-lang').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
      document.querySelectorAll('.page-nav').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
    });
  });
  </script>
</body>
</html>
