
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Maid - Usage</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="usage-body">
    <div class="usage-wrapper">
        <div class="language-selector">
            <label for="language-select" data-key="language_select_label">?ём–ҙ ? нғқ:</label>
            <select id="language-select">
                <option value="ko">?ңкөӯ??/option>
                <option value="en">English</option>
                <option value="ja">?Ҙжң¬иӘ?/option>
                <option value="zh-Hans">з®ҖдҪ“дёӯ??/option>
                <option value="zh-Hant">з№Ғй«”дё?–Ү</option>
            </select>
        </div>

        <div class="usage-content">
            <div class="split-section left">
                <a href="inter-help-page1.html" id="desktop-interaction-link">
                    <img src="./images/desktop-interaction.png" alt="Desktop Interaction" class="bg-image">
                    <span class="overlay-text" data-key="desktop_interaction">Desktop Interaction</span>
                </a>
            </div>
            <div class="split-section right">
                <a href="ai-help-page1.html" id="ai-chat-interaction-link">
                    <img src="./images/ai-chat-interaction.png" alt="AI Chat Interaction" class="bg-image">
                    <span class="overlay-text" data-key="ai_chat_interaction">AI Chat Interaction</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="usage-footer">
        <a href="index.html" data-key="back_to_main">л©”мқё?јлЎң ?Ңм•„к°Җкё?/a>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const languageSelect = document.getElementById('language-select');
            const desktopInteractionLink = document.getElementById('desktop-interaction-link');
            const aiChatInteractionLink = document.getElementById('ai-chat-interaction-link');

            const translations = {
                ko: {
                    language_select_label: '?ём–ҙ ? нғқ:',
                    desktop_interaction: '?°мҠӨ?¬нғ‘ ?ён„°?үм…ҳ',
                    ai_chat_interaction: 'AI мұ„нҢ… ?ён„°?үм…ҳ',
                    back_to_main: 'л©”мқё?јлЎң ?Ңм•„к°Җкё?
                },
                en: {
                    language_select_label: 'Select Language:',
                    desktop_interaction: 'Desktop Interaction',
                    ai_chat_interaction: 'AI Chat Interaction',
                    back_to_main: 'Back to Main'
                },
                ja: {
                    language_select_label: 'иЁҖиӘһйҒё??',
                    desktop_interaction: '?ҮгӮ№??ғҲ?ғгғ—?ҚдҪң',
                    ai_chat_interaction: 'AI?ҒгғЈ?ғгғҲ?ҚдҪң',
                    back_to_main: '?ЎгӮӨ?ігҒ«?»гӮӢ'
                },
                'zh-Hans': {
                    language_select_label: '?үжӢ©иҜ??:',
                    desktop_interaction: 'жЎҢйқўдәӨдә’',
                    ai_chat_interaction: 'AI?ҠеӨ©дәӨдә’',
                    back_to_main: 'иҝ”еӣһдё»йЎө'
                },
                'zh-Hant': {
                    language_select_label: '?ёж“ҮиӘһи?:',
                    desktop_interaction: 'жЎҢйқўдә’еӢ•',
                    ai_chat_interaction: 'AI?ҠеӨ©дә’еӢ•',
                    back_to_main: 'иҝ”еӣһдё»й Ғ'
                }
            };

            function updateLinks(lang) {
                desktopInteractionLink.href = `inter-help-page1.html`;
                aiChatInteractionLink.href = `ai-help-page1.html`;
            }

            function updatePageText(lang) {
                document.querySelectorAll('[data-key]').forEach(element => {
                    const key = element.getAttribute('data-key');
                    if (translations[lang] && translations[lang][key]) {
                        element.textContent = translations[lang][key];
                    }
                });
            }

            const savedLang = localStorage.getItem('desktopMaidLang');
            if (savedLang) {
                languageSelect.value = savedLang;
            } else {
                languageSelect.value = 'ko';
            }
            updateLinks(languageSelect.value);
            updatePageText(languageSelect.value); // ?ҳмқҙм§Җ ?ҚмҠӨ???…лҚ°?ҙнҠё м¶”к?

            languageSelect.addEventListener('change', (event) => {
                const selectedLang = event.target.value;
                localStorage.setItem('desktopMaidLang', selectedLang);
                updateLinks(selectedLang);
                updatePageText(selectedLang); // ?ҳмқҙм§Җ ?ҚмҠӨ???…лҚ°?ҙнҠё м¶”к?
            });
        });
    </script>
</body>
</html>
