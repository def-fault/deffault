<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4. 알람 활용하기</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html,body{height:auto;overflow-y:auto}
    .container{padding:20px;max-width:900px;margin:auto}
    .controllers{display:flex;justify-content:flex-end;align-items:center;gap:25px;height:60px;width:100%;padding:0 40px;background:#23272a;border-bottom:1px solid #424549;box-sizing:border-box}
    .controllers .language-selector,.controllers .help-level-selector{background:none;border:none;display:flex;align-items:center;gap:8px}

    /* 토글 스위치 */
    .toggle-switch{position:relative;display:inline-block;width:50px;height:24px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#4f545c;border-radius:24px}
    .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%}
    input:checked + .slider{background:#409eff}
    input:checked + .slider:before{transform:translateX(26px)}

    .detailed-info{display:none}.simple-info{display:block}
    body.detailed-view .detailed-info{display:block}
    body.detailed-view .simple-info{display:none}

    a.page-nav{display:inline-block;margin-top:30px;text-decoration:none;background:#eee;padding:10px 20px;border-radius:6px}
    .multi-lang{white-space:pre-line;}
  </style>
</head>
<body>
  <!-- 상단 컨트롤러 -->
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
      <label class="toggle-switch"><input type="checkbox" id="help-level-toggle"><span class="slider"></span></label>
      <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
    </div>
    <div class="language-selector">
      <label class="multi-lang" for="language-select"
             data-ko="언어:" data-en="Language:" data-ja="言語:"
             data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
      <select id="language-select">
        <option value="ko">한국어</option><option value="en">English</option>
        <option value="ja">日本語</option><option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
      </select>
    </div>
  </div>

  <!-- ■■■ container ■■■ -->
  <div class="container">
    <h2 class="multi-lang"
        data-ko="⏰ [4] 알람 활용하기"
        data-en="⏰ [4] Using Alarms"
        data-ja="⏰ [4] アラームを活用する"
        data-zh-Hans="⏰ [4] 使用闹钟"
        data-zh-Hant="⏰ [4] 使用鬧鐘">⏰ [4] 알람 활용하기</h2>

	  
<img src="image/VRM_Step4.png" alt="" style="max-width:100%; height:auto;">
    <!-- 간단 설명 -->
    <p class="simple-info multi-lang"
       data-ko="사이드바에서 알람을 설정하고 캐릭터 댄스 파티를 즐겨보세요."
       data-en="Set alarms from the sidebar and enjoy a character dance party when time’s up."
       data-ja="サイドバーでアラームを設定し、時間になるとキャラクターのダンスパーティーを楽しみましょう。"
       data-zh-Hans="在侧栏设置闹钟，时间到时享受角色舞蹈派对。"
       data-zh-Hant="在側欄設置鬧鐘，時間到時享受角色舞蹈派對。">사이드바에서 알람을 설정하고 캐릭터 댄스 파티를 즐겨보세요.</p>

    <!-- 상세 설명 -->
    <div class="detailed-info">
      <ul>
        <li class="multi-lang"
            data-ko="🕒 &lt;메인&gt; 창의 사이드바에서 알람을 설정할 수 있어요."
            data-en="🕒 You can set alarms from the sidebar in the &lt;Main&gt; window."
            data-ja="🕒 &lt;メイン&gt;画面のサイドバーでアラームを設定できます。"
            data-zh-Hans="🕒 可在 &lt;主界面&gt; 侧栏设置闹钟。"
            data-zh-Hant="🕒 可在 &lt;主畫面&gt; 側欄設置鬧鐘。">🕒 &lt;메인&gt; 창의 사이드바에서 알람을 설정할 수 있어요.</li>

        <li class="multi-lang"
            data-ko="🎵 자신만의 음악을 설정할 수 있어요."
            data-en="🎵 You can choose your own music."
            data-ja="🎵 好きな音楽を設定できます。"
            data-zh-Hans="🎵 可以自定义音乐。"
            data-zh-Hant="🎵 可以自訂音樂。">🎵 자신만의 음악을 설정할 수 있어요.</li>

        <li class="multi-lang"
            data-ko="💃 시간이 되면 캐릭터들이 화면에서 춤을 춰요."
            data-en="💃 When the time comes, characters dance on screen."
            data-ja="💃 時間になるとキャラクターが画面で踊ります。"
            data-zh-Hans="💃 时间到时角色会在屏幕上跳舞。"
            data-zh-Hant="💃 時間到時角色會在螢幕上跳舞。">💃 시간이 되면 캐릭터들이 화면에서 춤을 춰요.</li>
      </ul>
    </div>

    <!-- 네비게이션 -->
    <a class="page-nav prev" href="inter-help-page3.html"
       data-ko="← 이전: 캐릭터 인터렉션"
       data-en="← Previous: Character Interaction"
       data-ja="← 前へ：キャラクターインタラクション"
       data-zh-Hans="← 上一步：角色交互"
       data-zh-Hant="← 上一步：角色互動">← 이전: 캐릭터 인터렉션</a>

    <a class="page-nav next" href="inter-help-page5.html"
       data-ko="다음: 유용한 기능 →"
       data-en="Next: Useful Features →"
       data-ja="次へ：便利機能 →"
       data-zh-Hans="下一步：实用功能 →"
       data-zh-Hant="下一步：實用功能 →">다음: 유용한 기능 →</a>
  </div><!-- container 끝 -->

  <!-- 언어·토글 스크립트 -->
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      const toggle=document.getElementById('help-level-toggle');
      const langSel=document.getElementById('language-select');
      const savedView=localStorage.getItem('desktopMaidHelpLevel')||'simple';
      const savedLang=localStorage.getItem('desktopMaidLang')||'ko';

      if(savedView==='detailed'){document.body.classList.add('detailed-view');toggle.checked=true;}
      langSel.value=savedLang;document.documentElement.lang=savedLang;

      const applyLang=lang=>{
        document.querySelectorAll('.multi-lang').forEach(el=>{
          const txt=el.getAttribute(`data-${lang}`);if(txt!==null)el.textContent=txt;
        });
        document.querySelectorAll('.page-nav').forEach(el=>{
          const txt=el.getAttribute(`data-${lang}`);if(txt!==null)el.textContent=txt;
        });
      };
      applyLang(savedLang);

      toggle.addEventListener('change',()=>{
        const v=toggle.checked?'detailed':'simple';
        localStorage.setItem('desktopMaidHelpLevel',v);
        document.body.classList.toggle('detailed-view',v==='detailed');
      });
      langSel.addEventListener('change',e=>{
        const lang=e.target.value;
        localStorage.setItem('desktopMaidLang',lang);
        document.documentElement.lang=lang;
        applyLang(lang);
      });
    });
  </script>
</body>
</html>
