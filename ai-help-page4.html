<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. 대화 시작하기</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        html, body { height: auto; overflow-y: auto; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .controllers { display: flex; justify-content: flex-end; align-items: center; gap: 25px; height: 60px; width: 100%; padding: 0 40px; background: #23272a; border-bottom: 1px solid #424549; box-sizing: border-box; }
        .controllers .language-selector, .controllers .help-level-selector { background: none; border: none; display: flex; align-items: center; gap: 8px; }
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4f545c; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #409eff; }
        input:checked + .slider:before { transform: translateX(26px); }
        .detailed-info { display: none; }
        .simple-info { display: block; }
        body.detailed-view .detailed-info { display: block; }
        body.detailed-view .simple-info { display: none; }
        a.page-nav { display: inline-block; margin-top: 30px; text-decoration: none; background: #eee; padding: 10px 20px; border-radius: 6px; color: #333; }
    </style>
</head>
<body>
    <div class="controllers">
        <div class="help-level-selector">
            <span class="multi-lang" data-ko="간단" data-en="Simple" data-ja="簡易" data-zh-Hans="简单" data-zh-Hant="簡單">간단</span>
            <label class="toggle-switch">
                <input type="checkbox" id="help-level-toggle">
                <span class="slider"></span>
            </label>
            <span class="multi-lang" data-ko="상세" data-en="Detailed" data-ja="詳細" data-zh-Hans="详细" data-zh-Hant="詳細">상세</span>
        </div>
        <div class="language-selector">
            <label for="language-select" class="multi-lang" data-ko="언어:" data-en="Language:" data-ja="言語:" data-zh-Hans="语言：" data-zh-Hant="語言：">언어:</label>
            <select id="language-select">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh-Hans">简体中文</option>
                <option value="zh-Hant">繁體中文</option>
            </select>
        </div>
    </div>

    <div class="container">
        <h2 class="multi-lang" data-ko="🔹 4. 대화 시작하기" data-en="🔹 4. Start talking" data-ja="🔹 4. 会話を始める" data-zh-Hans="🔹 4. 开始对话" data-zh-Hant="🔹 4. 開始對話">🔹 4. 대화 시작하기</h2>
        
        <img src="image/AI_Step4.png" alt="" style="max-width:100%; height:auto; border-radius: 8px; border: 1px solid #424549; margin: 20px 0;">
        
        <p class="multi-lang" data-ko="이제 캐릭터와 즐겁게 대화해 보세요!" data-en="Now, enjoy chatting with the character!" data-ja="이제 캐릭터와 즐겁게 대화해 보세요!" data-zh-Hans="现在，开始愉快地与角色聊天吧！" data-zh-Hant="現在，開始愉快地與角色聊天吧！">이제 캐릭터와 즐겁게 대화해 보세요!</p>

        <div class="detailed-info">
            <ul>
                <li class="multi-lang" data-ko="채팅창 입력: 화면 하단의 채팅창에 메시지를 입력하고 Enter를 누르세요." data-en="Chat Input: Type a message in the chat box at the bottom of the screen and press Enter." data-ja="채팅창 입력: 화면 하단의 채팅창에 메시지를 입력하고 Enter를 누르세요." data-zh-Hans="聊天输入：在屏幕底部的聊天框中输入消息，然后按Enter键。" data-zh-Hant="聊天輸入：在螢幕底部的聊天框中輸入訊息，然後按Enter鍵。">채팅창 입력: 화면 하단의 채팅창에 메시지를 입력하고 Enter를 누르세요.</li>
                <li class="multi-lang" data-ko="반응 속도: 사용 중인 모델에 따라 AI의 답변 속도가 달라질 수 있습니다." data-en="Response Speed: AI response speed may vary depending on the model you are using." data-ja="반응 속도: 사용 중인 모델에 따라 AI의 답변 속도가 달라질 수 있습니다." data-zh-Hans="响应速度：取决于您使用的模型，AI的回答速度可能会有所不同。" data-zh-Hant="回應速度：取決於您使用的模型，AI的回答速度可能會有所不同。">반응 속도: 사용 중인 모델에 따라 AI의 답변 속도가 달라질 수 있습니다.</li>
            </ul>
        </div>

        <a class="page-nav prev multi-lang" href="ai-help-page3.html" data-ko="← 이전: 캐릭터 설정" data-en="← Prev: Configure character" data-ja="← 이전: 캐릭터 설정" data-zh-Hans="← 上一步：配置角色" data-zh-Hant="← 上一步：配置角色">← 이전: 캐릭터 설정</a>
        <a class="page-nav next multi-lang" href="ai-help-page5.html" data-ko="다음: 음성 기능(TTS) 사용하기 →" data-en="Next: Use voice (TTS) →" data-ja="다음: 음성 기능(TTS) 사용하기 →" data-zh-Hans="下一步：使用语音(TTS) →" data-zh-Hant="下一步：使用語音(TTS) →">다음: 음성 기능(TTS) 사용하기 →</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const helpLevelToggle = document.getElementById('help-level-toggle');
            const languageSelect = document.getElementById('language-select');
            const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
            const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

            if (savedLevel === 'detailed') {
                document.body.classList.add('detailed-view');
                helpLevelToggle.checked = true;
            }

            languageSelect.value = savedLang;
            document.documentElement.lang = savedLang;

            const updateLang = (lang) => {
                document.querySelectorAll('.multi-lang').forEach(el => {
                    const txt = el.getAttribute(`data-${lang}`);
                    if (txt) el.innerHTML = txt;
                });
                document.querySelectorAll('.page-nav').forEach(el => {
                    const txt = el.getAttribute(`data-${lang}`);
                    if (txt) el.textContent = txt;
                });
            };

            updateLang(savedLang);

            helpLevelToggle.addEventListener('change', () => {
                const level = helpLevelToggle.checked ? 'detailed' : 'simple';
                localStorage.setItem('desktopMaidHelpLevel', level);
                document.body.classList.toggle('detailed-view', level === 'detailed');
            });

            languageSelect.addEventListener('change', e => {
                const lang = e.target.value;
                localStorage.setItem('desktopMaidLang', lang);
                document.documentElement.lang = lang;
                updateLang(lang);
            });
        });
    </script>
</body>
</html>
