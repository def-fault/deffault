<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2. 나를 캐릭터에게 소개하기</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    html, body { height: auto; overflow-y: auto; }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .controllers {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 25px;
      height: 60px;
      width: 100%;
      padding: 0 40px;
      background: #23272a;
      border-bottom: 1px solid #424549;
      box-sizing: border-box;
    }
    .controllers .language-selector,
    .controllers .help-level-selector {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #4f545c;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #409eff;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .detailed-info { display: none; }
    .simple-info { display: block; }
    body.detailed-view .detailed-info { display: block; }
    body.detailed-view .simple-info { display: none; }
    a.page-nav { display: inline-block; margin-top: 30px; text-decoration: none; background: #eee; padding: 10px 20px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="controllers">
    <div class="help-level-selector">
      <span class="multi-lang" 
        data-ko="간단" 
        data-en="Simple" 
        data-ja="簡易" 
        data-zh-Hans="简单" 
        data-zh-Hant="簡單">
      </span>
      <label class="toggle-switch">
        <input type="checkbox" id="help-level-toggle">
        <span class="slider"></span>
      </label>
      <span class="multi-lang" 
        data-ko="상세" 
        data-en="Detailed" 
        data-ja="詳細" 
        data-zh-Hans="详细" 
        data-zh-Hant="詳細">
      </span>
    </div>
    <div class="language-selector">
      <label for="language-select" class="multi-lang"
        data-ko="언어:"
        data-en="Language:"
        data-ja="言語:"
        data-zh-Hans="语言："
        data-zh-Hant="語言：">
      </label>
      <select id="language-select">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
      </select>
    </div>
  </div>
  <div class="container">
    <h2 class="multi-lang"
      data-ko="🔹 2. 나를 캐릭터에게 소개하기 (유저 프로필 설정)"
      data-en="🔹 2. Introducing Yourself to the Character (User Profile Setup)"
      data-ja="🔹 2. キャラクターに自分を紹介する（ユーザープロフィール設定）"
      data-zh-Hans="🔹 2. 向角色介绍自己（用户资料设定）"
      data-zh-Hant="🔹 2. 向角色介紹自己（使用者資料設定）">
    </h2>

	  
	<img src="image/AI_Step2.png" alt="" style="max-width:100%; height:auto;">
    <p class="multi-lang"
      data-ko="캐릭터가 당신을 더 잘 이해하고 자연스럽게 대화할 수 있도록, 유저 프로필을 설정해 주세요."
      data-en="Set your user profile so the character can better understand you and talk more naturally."
      data-ja="キャラクターがあなたをより理解し、自然に会話できるように、ユーザープロフィールを設定してください。"
      data-zh-Hans="请设定用户资料，让角色更了解您并自然地与您交谈。"
      data-zh-Hant="請設定使用者資料，讓角色更了解您並自然地與您交談。">
    </p>

    <div class="detailed-info">
      <p class="multi-lang"
        data-ko="✏️ 프로필 설정 방법: <메인> 창의 위쪽에서 #프로필 아래 유저 프로필 영역을 클릭합니다."
        data-en="✏️ How to set: Click the user profile area under #Profile at the top of the <Main> window."
        data-ja="✏️ 設定方法：<メイン>画面の上部にある#プロフィールの下のユーザープロフィール領域をクリックします。"
        data-zh-Hans="✏️ 设置方式：点击<主界面>顶部#个人资料下方的用户资料区域。"
        data-zh-Hant="✏️ 設定方式：點擊<主介面>上方#個人資料下方的使用者資料區域。">
      </p>
		
		
      <p class="multi-lang"
        data-ko="아래 두 항목을 자유롭게 작성합니다:"
        data-en="Fill in the following two items freely:"
        data-ja="以下の2つの項目を自由に記入してください："
        data-zh-Hans="请自由填写以下两个项目："
        data-zh-Hant="請自由填寫以下兩個項目：">
      </p>
      <ul>
	  <li class="multi-lang"
		  data-ko="프로필 메시지 → 당신의 현재 상태에 맞는 짧은 메시지를 설정할 수 있어요."
		  data-en="Profile Message → You can set a short message reflecting your current state."
		  data-ja="プロフィールメッセージ → 現在の状態に合った短いメッセージを設定できます。"
		  data-zh-Hans="个人状态信息 → 可设置一句反映您当前状态的简短消息。"
		  data-zh-Hant="個人狀態訊息 → 可設定一句反映您目前狀態的簡短訊息。">
	  </li>
	  <li class="multi-lang"
		  data-ko="예시: &quot;지금은 피곤하니까 말을 좀 아껴줘!&quot;, &quot;기분 최고! 같이 수다 떨자!&quot;"
		  data-en="Example: &quot;I'm tired, so please keep it quiet!&quot;, &quot;Feeling great! Let's chat!&quot;"
		  data-ja="例：&quot;今は疲れているから静かにしてね！&quot;, &quot;最高の気分！おしゃべりしよう！&quot;"
		  data-zh-Hans="例如：“现在有点累，请说话轻一点！”、“心情很好，一起来聊天吧！”"
		  data-zh-Hant="例如：「現在有點累，請小聲說話！」、「心情很好，一起來聊天吧！」">
	  </li>

        <li class="multi-lang"
          data-ko="자기소개 → 당신에 대한 정보를 자유롭게 써주세요. 성격, 취미, 관심사 등을 캐릭터가 기억하고 대화에 활용해요."
          data-en="Self-introduction → Write about yourself freely. The character will remember and use it in conversations."
          data-ja="自己紹介 → 自由に自分について書いてください。キャラクターが覚えて会話に活用します。"
          data-zh-Hans="自我介绍 → 请自由撰写您的信息，角色会记住并在对话中运用。"
          data-zh-Hant="自我介紹 → 請自由撰寫您的資訊，角色會記住並在對話中使用。">
        </li>
      </ul>
    </div>
    <a class="page-nav prev" href="ai-help-page1.html"
      data-ko="← 이전: AI 대화 기능 설정"
      data-en="← Previous: Enable AI Chat"
      data-ja="← 前へ：AI会話機能の設定"
      data-zh-Hans="← 上一步：启用AI对话功能"
      data-zh-Hant="← 上一步：啟用AI對話功能">
    </a>
    <a class="page-nav next" href="ai-help-page3.html"
      data-ko="다음: 캐릭터 프리셋 추가하기 →"
      data-en="Next: Add Character Preset →"
      data-ja="次へ：キャラクタープリセットを追加 →"
      data-zh-Hans="下一步：添加角色预设 →"
      data-zh-Hant="下一步：新增角色預設 →">
    </a>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const helpLevelToggle = document.getElementById('help-level-toggle');
    const languageSelect = document.getElementById('language-select');
    const savedLevel = localStorage.getItem('desktopMaidHelpLevel') || 'simple';
    const savedLang = localStorage.getItem('desktopMaidLang') || 'ko';

    if (savedLevel === 'detailed') {
      document.body.classList.add('detailed-view');
      helpLevelToggle.checked = true;
    }

    languageSelect.value = savedLang;
    document.documentElement.lang = savedLang;

    // 초기 다국어 텍스트 세팅
    document.querySelectorAll('.multi-lang').forEach(el => {
      const text = el.getAttribute(`data-${savedLang}`);
      if (text) el.textContent = text;
    });
    document.querySelectorAll('.page-nav').forEach(el => {
      const text = el.getAttribute(`data-${savedLang}`);
      if (text) el.textContent = text;
    });

    // 이벤트 핸들러 설정
    helpLevelToggle.addEventListener('change', () => {
      const level = helpLevelToggle.checked ? 'detailed' : 'simple';
      localStorage.setItem('desktopMaidHelpLevel', level);
      document.body.classList.toggle('detailed-view', level === 'detailed');
    });

    languageSelect.addEventListener('change', e => {
      const lang = e.target.value;
      localStorage.setItem('desktopMaidLang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('.multi-lang').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
      document.querySelectorAll('.page-nav').forEach(el => {
        const text = el.getAttribute(`data-${lang}`);
        if (text) el.textContent = text;
      });
    });
  });
  </script>
</body>
</html>
